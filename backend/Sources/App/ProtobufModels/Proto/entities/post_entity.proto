syntax = "proto3";

package entities;

import "common/identifiers.proto";
import "common/timestamp.proto";
import "common/enums.proto";

import "entities/media_entity.proto";
import "entities/reply_entity.proto";

message PostEntity {
    common.PostId post_id = 1;
    common.ChatId chat_id = 2;
    common.ChatMemberId member_id = 3;
    
    common.PostType post_type = 4;
    entities.MediaEntity media_entity = 5;
    
    string title = 6;
    string description_text = 7;
    
    entities.ReplyEntity reply_entity = 8;
    common.Timestamp timestamp = 9;
}
