syntax = "proto3";

package responses;

import "common/identifiers.proto";

import "entities/comment_entity.proto";
import "entities/layer_entity.proto";
import "entities/post_entity.proto";
import "entities/reaction_entity.proto";


import "common_requests/common_requests.proto";

message ServerResponse {
    common.RequestId request_id = 1;
    bool success = 2;
    string error_message = 3;
    oneof payload {
        entities.PostEntity response_send_post = 4;
        entities.CommentEntity response_send_comment = 5;
        entities.LayerEntity response_send_layer = 6;
        entities.ReactionEntity response_send_reaction = 7;
        
        common_requests.DeliveryStatusPayload response_send_status = 8;
    }
}
